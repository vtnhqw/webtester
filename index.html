<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Links</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #07070f;
  color: white;
  margin: 0;
}

.page {
  max-width: 560px;
  margin: auto;
  padding-bottom: 60px;
}

/* Banner */
.banner-wrap {
  height: 180px;
  overflow: hidden;
}
.banner-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Profile */
.profile {
  text-align: center;
}
.avatar {
  width: 90px;
  height: 90px;
  border-radius: 20px;
  margin-top: -45px;
  border: 3px solid #07070f;
}
.name {
  font-family: 'Syne';
  font-size: 1.8rem;
  margin: 10px 0 5px;
}
.bio {
  color: #aaa;
  font-size: 14px;
}

/* Sections */
.sections {
  padding: 20px;
}
.section {
  margin-bottom: 25px;
}
.section-title {
  font-size: 12px;
  color: #666;
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* Links */
.link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  text-decoration: none;
  color: white;
  transition: 0.2s;
}
.link:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.1);
}

</style>
</head>

<body>

<div class="page" id="app">Loading...</div>

<script>
async function loadData() {
  const res = await fetch('data.json');
  return await res.json();
}

function renderLink(link) {
  return `
    <a href="${link.url}" target="_blank" class="link">
      <span>${link.title}</span>
      <span>→</span>
    </a>
  `;
}

async function init() {
  const data = await loadData();
  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="banner-wrap">
      ${data.profile.banner ? `<img src="${data.profile.banner}" class="banner-img"/>` : ""}
    </div>

    <div class="profile">
      <img src="${data.profile.avatar || 'https://i.pravatar.cc/150'}" class="avatar"/>
      <div class="name">${data.profile.name}</div>
      <div class="bio">${data.profile.bio}</div>
    </div>

    <div class="sections">
      ${data.sections.map(section => `
        <div class="section">
          <div class="section-title">${section.title}</div>
          ${section.links.map(renderLink).join('')}
        </div>
      `).join('')}
    </div>
  `;
}

init();
</script>

</body>
</html>
